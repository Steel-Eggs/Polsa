<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Учёт расходов — дашборд</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header>
      <div>
        <p class="eyebrow">Финансы Антона</p>
        <h1>Расходы 2026</h1>
      </div>
      <div class="meta">
        <span id="lastUpdated"></span>
        <button id="resetFilters" type="button">Сбросить фильтры</button>
      </div>
    </header>

    <section class="controls">
      <label>
        Категория
        <select id="categoryFilter">
          <option value="">Все</option>
        </select>
      </label>
      <label>
        Подкатегория
        <select id="subcategoryFilter">
          <option value="">Все</option>
        </select>
      </label>
      <label>
        Период c
        <input type="date" id="dateFrom" />
      </label>
      <label>
        по
        <input type="date" id="dateTo" />
      </label>
      <label class="search">
        Поиск (магазин/позиция)
        <input type="text" id="searchFilter" placeholder="Например: Лента" />
      </label>
    </section>

    <section class="add-expense" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
      <h2 style="font-size: 16px; margin-bottom: 10px;">Добавить расход</h2>
      <form id="addExpenseForm" style="display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="date" id="newDate" required style="padding: 5px;"/>
        <input type="text" id="newVendor" placeholder="Магазин" required style="padding: 5px;"/>
        <input type="text" id="newCategory" placeholder="Категория" required style="padding: 5px;" list="catList"/>
        <datalist id="catList"></datalist>
        <input type="text" id="newSubcat" placeholder="Подкатегория" style="padding: 5px;"/>
        <input type="text" id="newItem" placeholder="Позиция" required style="padding: 5px;"/>
        <input type="number" step="0.01" id="newPrice" placeholder="Сумма" required style="padding: 5px; width: 100px;"/>
        <select id="newPayment" style="padding: 5px;">
          <option value="Безнал (Сбербанк)">Безнал (Сбербанк)</option>
          <option value="Наличка">Наличка</option>
          <option value="Кредитка">Кредитка</option>
        </select>
        <input type="text" id="newNotes" placeholder="Заметки" style="padding: 5px;"/>
        <button type="submit" style="padding: 5px 15px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">Добавить</button>
      </form>
    </section>

    <section class="summary" id="summary"></section>

    <section class="category-stats">
      <div class="category-stats__header">
        <div>
          <h2>Категории расходов</h2>
          <p class="small">Доля и сумма по текущей выборке</p>
        </div>
        <span id="categoryStatsHint" class="small"></span>
      </div>
      <div id="categoryStats" class="category-stats__list"></div>
    </section>

    <section class="charts">
      <article>
        <div class="chart-header">
          <h2>По неделям</h2>
          <span class="small">ISO неделя</span>
        </div>
        <canvas id="weeklyChart" height="220"></canvas>
      </article>
      <article>
        <div class="chart-header">
          <h2>По месяцам</h2>
          <span class="small">Календарные месяцы</span>
        </div>
        <canvas id="monthlyChart" height="220"></canvas>
      </article>
    </section>

    <section class="table-block">
      <div class="table-header">
        <h2>Список трат</h2>
        <span id="tableInfo" class="small"></span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Дата</th>
              <th>Магазин</th>
              <th>Категория</th>
              <th>Подкатегория</th>
              <th>Позиция</th>
              <th>Сумма</th>
              <th>Заметка</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js" integrity="sha384-y4QwyQXu1nxzZJLdnOjFkMrDXLI4YAlnXrhIRbkIuAeGHNirMRHkRkNvztNFVQVw" crossorigin="anonymous"></script>
    <script src="../expenses-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
